<script>
(function(){
  const JP = ['ノーマル','ほのお','みず','でんき','くさ','こおり','かくとう','どく','じめん','ひこう','エスパー','むし','いわ','ゴースト','ドラゴン','あく','はがね','フェアリー'];
  const EN = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
  const TYPESET = new Set(JP.concat(EN));
  function extractTypes(fromNode){
    if(!fromNode) return [];
    const texts = [];
    const walker = document.createTreeWalker(fromNode, NodeFilter.SHOW_TEXT, null);
    while(walker.nextNode()){
      const t = walker.currentNode.nodeValue.trim();
      if(TYPESET.has(t)) texts.push(t);
    }
    return texts.slice(0,2);
  }
  function setVal(id, val){ const el = document.getElementById(id); if(el) el.value = val||''; }
  function syncOne(prefixAuto, id1, id2){
    const auto = document.getElementById(prefixAuto);
    const ts = extractTypes(auto);
    setVal(id1, ts[0]||'');
    setVal(id2, ts[1]||'');
  }
  function syncAll(){
    syncOne('atk_types','atk_t1','atk_t2');
    syncOne('def_types','def_t1','def_t2');
    syncOne('v13_def1_types','v13_def1_t1','v13_def1_t2');
    syncOne('v13_def2_types','v13_def2_t1','v13_def2_t2');
    syncOne('v13_def3_types','v13_def3_t1','v13_def3_t2');
  }
  document.addEventListener('DOMContentLoaded', syncAll);
  // Observe changes in auto-badges to keep inputs in sync
  ['atk_types','def_types','v13_def1_types','v13_def2_types','v13_def3_types'].forEach(id=>{
    const n = document.getElementById(id);
    if(!n) return;
    const obs = new MutationObserver(syncAll);
    obs.observe(n, {childList:true, subtree:true, characterData:true});
  });
})();
</script><div id="build_version">SHARE+TERA 20251005-1241</div><div id="copy_toast">コピーしました</div><script>
(function(){
  // Permalink: serialize inputs/selects/textarea with IDs into base64 JSON under location.hash "#s="
  function collectState(){
    const data = {};
    const elems = document.querySelectorAll('input[id], select[id], textarea[id]');
    elems.forEach(el=>{
      if(el.type === 'password') return;
      // skip hidden technical fields except those we care about (atk_t1/2 etc.)
      if(el.type === 'hidden' && !/^atk_t[12]|^def_t[12]|^v13_def[123]_t[12]/.test(el.id)) return;
      // only store if has a value
      let val = (el.type==='checkbox') ? (el.checked?1:0) : el.value;
      if(val !== "" && val !== null && val !== undefined){
        data[el.id] = val;
      }
    });
    return data;
  }
  function applyState(data){
    if(!data) return;
    Object.keys(data).forEach(id=>{
      const el = document.getElementById(id);
      if(!el) return;
      if(el.type==='checkbox') el.checked = !!Number(data[id]);
      else el.value = data[id];
      el.dispatchEvent(new Event('input', {bubbles:true}));
      el.dispatchEvent(new Event('change', {bubbles:true}));
    });
    // Apply tera effects after base state
    syncTera();
  }
  function encodeState(obj){
    try{
      const s = JSON.stringify(obj);
      return btoa(unescape(encodeURIComponent(s)));
    }catch(e){ return ""; }
  }
  function decodeState(s){
    try{
      const json = decodeURIComponent(escape(atob(s)));
      return JSON.parse(json);
    }catch(e){ return null; }
  }
  function updateURLHash(){
    const st = collectState();
    const enc = encodeState(st);
    if(enc){
      const url = location.origin + location.pathname + "#s=" + enc;
      history.replaceState(null,"",url);
      return url;
    }
    return location.href;
  }
  function copyURL(u){
    try{
      navigator.clipboard.writeText(u).then(()=>showToast());
    }catch(e){
      const ta = document.createElement('textarea'); ta.value = u; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast();
    }
  }
  function showToast(){
    const t = document.getElementById('copy_toast'); if(!t) return;
    t.style.display='block'; setTimeout(()=>{ t.style.display='none'; }, 1200);
  }

  // Tera logic
  const TYPES = ['ノーマル','ほのお','みず','でんき','くさ','こおり','かくとう','どく','じめん','ひこう','エスパー','むし','いわ','ゴースト','ドラゴン','あく','はがね','フェアリー','Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
  const isType = (t)=> TYPES.indexOf(String(t||'').trim())>=0;

  function setVal(id, v){ const el=document.getElementById(id); if(el){ el.value=v||''; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); } }
  function getVal(id){ const el=document.getElementById(id); return el?el.value:''; }

  function syncTera(){
    const on = document.getElementById('tera_on')?.checked;
    const tsel = document.getElementById('tera_type_select');
    const ttype = tsel ? tsel.value : '';

    if(on && isType(ttype)){
      // save original atk types once
      const root = document.body;
      if(!root.dataset.savedAtkTypes){
        root.dataset.savedAtkTypes = JSON.stringify({t1:getVal('atk_t1'), t2:getVal('atk_t2')});
      }
      // override effective atk types to tera type only
      setVal('atk_t1', ttype);
      setVal('atk_t2', '');
      // if move is Tera Blast, force its type to tera type
      const mvname = getVal('atk_move_name').trim();
      if(/テラバースト|Tera\s*Blast/i.test(mvname)){
        setVal('v13_move_type', ttype);
      }
    }else{
      // restore original atk types if saved
      const root = document.body;
      if(root.dataset.savedAtkTypes){
        try{
          const o = JSON.parse(root.dataset.savedAtkTypes);
          setVal('atk_t1', o.t1||'');
          setVal('atk_t2', o.t2||'');
        }catch(e){}
        delete root.dataset.savedAtkTypes;
      }
      // if Tera Blast, set move type back to Normal/ノーマル if it was set by us
      const mvname = getVal('atk_move_name').trim();
      if(/テラバースト|Tera\s*Blast/i.test(mvname)){
        // choose locale based on existing UI (prefer ノーマル if present in list)
        setVal('v13_move_type', 'ノーマル');
      }
    }
  }

  // Wire up UI
  document.getElementById('share_copy_btn')?.addEventListener('click', ()=>{
    const url = updateURLHash();
    copyURL(url);
  });
  document.getElementById('tera_on')?.addEventListener('change', ()=>{
    syncTera(); updateURLHash();
  });
  document.getElementById('tera_type_select')?.addEventListener('change', ()=>{
    syncTera(); updateURLHash();
  });
  // Also watch move name changes for Tera Blast handling
  document.getElementById('atk_move_name')?.addEventListener('input', ()=>{
    syncTera(); updateURLHash();
  });

  // Restore from hash on load
  function tryRestoreFromHash(){
    const h = location.hash||'';
    const m = h.match(/[#&]s=([^&]+)/);
    if(m && m[1]){
      const st = decodeState(m[1]);
      applyState(st);
    }
  }
  document.addEventListener('DOMContentLoaded', ()=>{
    tryRestoreFromHash();
  });
})();</script></body>
