<script>
(function(){
  const JP = ['ノーマル','ほのお','みず','でんき','くさ','こおり','かくとう','どく','じめん','ひこう','エスパー','むし','いわ','ゴースト','ドラゴン','あく','はがね','フェアリー'];
  const EN = ['Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
  const TYPESET = new Set(JP.concat(EN));
  function extractTypes(fromNode){
    if(!fromNode) return [];
    const texts = [];
    const walker = document.createTreeWalker(fromNode, NodeFilter.SHOW_TEXT, null);
    while(walker.nextNode()){
      const t = walker.currentNode.nodeValue.trim();
      if(TYPESET.has(t)) texts.push(t);
    }
    return texts.slice(0,2);
  }
  function setVal(id, val){ const el = document.getElementById(id); if(el) el.value = val||''; }
  function syncOne(prefixAuto, id1, id2){
    const auto = document.getElementById(prefixAuto);
    const ts = extractTypes(auto);
    setVal(id1, ts[0]||'');
    setVal(id2, ts[1]||'');
  }
  function syncAll(){
    syncOne('atk_types','atk_t1','atk_t2');
    syncOne('def_types','def_t1','def_t2');
    syncOne('v13_def1_types','v13_def1_t1','v13_def1_t2');
    syncOne('v13_def2_types','v13_def2_t1','v13_def2_t2');
    syncOne('v13_def3_types','v13_def3_t1','v13_def3_t2');
  }
  document.addEventListener('DOMContentLoaded', syncAll);
  // Observe changes in auto-badges to keep inputs in sync
  ['atk_types','def_types','v13_def1_types','v13_def2_types','v13_def3_types'].forEach(id=>{
    const n = document.getElementById(id);
    if(!n) return;
    const obs = new MutationObserver(syncAll);
    obs.observe(n, {childList:true, subtree:true, characterData:true});
  });
})();
</script><div id="build_version">SHARE+TERA v2 20251005-1247</div><div id="copy_toast">コピーしました</div><script>
(function(){
  // --- Helpers ---
  function debounce(fn, ms){
    let t; return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args), ms); };
  }
  function encodeState(obj){
    try{ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }catch(e){ return ""; }
  }
  function decodeState(s){
    try{ return JSON.parse(decodeURIComponent(escape(atob(s)))); }catch(e){ return null; }
  }
  function showToast(){
    const t = document.getElementById('copy_toast'); if(!t) return;
    t.style.display='block'; setTimeout(()=>{ t.style.display='none'; }, 1200);
  }
  function setVal(el, v){
    if(!el) return;
    const typ=(el.type||"").toLowerCase();
    if(typ==='checkbox') el.checked = !!Number(v);
    else if(typ==='radio') el.checked = (el.value==v);
    else el.value = v;
    el.dispatchEvent(new Event('input', {bubbles:true}));
    el.dispatchEvent(new Event('change', {bubbles:true}));
  }
  function getEl(id){ return document.getElementById(id); }
  const calcRoot = document.getElementById('calc') || document.body;

  // --- Collect & Apply (broadened scope) ---
  function collectState(){
    const data = {};
    // All inputs/selects/textareas within calc (including hidden)
    const elems = calcRoot.querySelectorAll('input, select, textarea');
    const seenRadioNames = new Set();
    elems.forEach(el=>{
      // skip inputs without id/name entirely
      if(!el.id && !el.name) return;
      const typ=(el.type||"").toLowerCase();
      if(typ==='radio'){
        if(!el.name || seenRadioNames.has(el.name)) return;
        const checked = calcRoot.querySelector(`input[type="radio"][name="${CSS.escape(el.name)}"]:checked`);
        data["name:"+el.name] = checked ? checked.value : "__none__";
        seenRadioNames.add(el.name);
      }else if(typ==='checkbox'){
        const key = el.id ? "id:"+el.id : "name:"+el.name;
        data[key] = el.checked ? 1 : 0;
      }else{
        const key = el.id ? "id:"+el.id : "name:"+el.name;
        const val = el.value;
        if(val !== undefined) data[key] = val;
      }
    });
    // Also persist our Tera UI (outside calc root)
    const teraOn = getEl('tera_on'); if(teraOn) data["id:tera_on"] = teraOn.checked ? 1 : 0;
    const teraSel = getEl('tera_type_select'); if(teraSel) data["id:tera_type_select"] = teraSel.value || "";
    return data;
  }

  function applyState(data){
    if(!data) return;
    Object.keys(data).forEach(k=>{
      const v = data[k];
      if(k.startsWith("id:")){
        const el = getEl(k.slice(3)); if(el) setVal(el, v);
      }else if(k.startsWith("name:")){
        const name = k.slice(5);
        const radios = calcRoot.querySelectorAll(`input[type="radio"][name="${CSS.escape(name)}"]`);
        if(radios.length){
          radios.forEach(r=>{ r.checked = (r.value==v); });
          if(radios[0]){
            radios[0].dispatchEvent(new Event('input',{bubbles:true}));
            radios[0].dispatchEvent(new Event('change',{bubbles:true}));
          }
        }else{
          const el = calcRoot.querySelector(`[name="${CSS.escape(name)}"]`);
          if(el) setVal(el, v);
        }
      }
    });
    syncTera(); // ensure tera effect is consistent after restore
  }

  function updateURLHash(){
    const st = collectState();
    const enc = encodeState(st);
    if(enc){
      const url = location.origin + location.pathname + "#s=" + enc;
      history.replaceState(null, "", url);
      return url;
    }
    return location.href;
  }

  function copyURL(u){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(u).then(showToast).catch(function(){
        const ta = document.createElement('textarea'); ta.value = u; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast();
      });
    }else{
      const ta = document.createElement('textarea'); ta.value = u; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast();
    }
  }

  // --- Tera logic with visible status ---
  const TYPES = ['ノーマル','ほのお','みず','でんき','くさ','こおり','かくとう','どく','じめん','ひこう','エスパー','むし','いわ','ゴースト','ドラゴン','あく','はがね','フェアリー','Normal','Fire','Water','Electric','Grass','Ice','Fighting','Poison','Ground','Flying','Psychic','Bug','Rock','Ghost','Dragon','Dark','Steel','Fairy'];
  const isType = (t)=> TYPES.indexOf(String(t||'').trim())>=0;
  function setById(id, v){ const el=getEl(id); if(el) setVal(el, v); }
  function getById(id){ const el=getEl(id); return el?(el.type==='checkbox'?(el.checked?1:0):el.value):""; }
  function updateTeraBadge(on, ttype){
    const badge = getEl('tera_status_badge'); if(!badge) return;
    if(on && isType(ttype)){
      badge.style.display = 'inline-block';
      badge.textContent = 'テラ適用中: ' + ttype;
    }else{
      badge.style.display = 'inline-block';
      badge.textContent = 'テラOFF';
    }
  }
  function syncTera(){
    const on = !!getById('tera_on');
    const ttype = getById('tera_type_select');
    if(on && isType(ttype)){
      const root = document.body;
      if(!root.dataset.savedAtkTypes){
        root.dataset.savedAtkTypes = JSON.stringify({t1:getById('atk_t1'), t2:getById('atk_t2')});
      }
      setById('atk_t1', ttype);
      setById('atk_t2', '');
      const mvname = String(getById('atk_move_name')).trim();
      if(/テラバースト|Tera\s*Blast/i.test(mvname)){
        setById('v13_move_type', ttype);
      }
    }else{
      const root = document.body;
      if(root.dataset.savedAtkTypes){
        try{ const o = JSON.parse(root.dataset.savedAtkTypes); setById('atk_t1', o.t1||''); setById('atk_t2', o.t2||''); }catch(e){}
        delete root.dataset.savedAtkTypes;
      }
      const mvname = String(getById('atk_move_name')).trim();
      if(/テラバースト|Tera\s*Blast/i.test(mvname)){
        setById('v13_move_type', 'ノーマル');
      }
    }
    updateTeraBadge(on, ttype);
  }

  // Wire up
  const copyBtn = document.getElementById('share_copy_btn');
  if(copyBtn) copyBtn.addEventListener('click', ()=>{ copyURL(updateURLHash()); });

  const teraOn = getEl('tera_on'), teraSel = getEl('tera_type_select');
  teraOn && teraOn.addEventListener('change', ()=>{ syncTera(); updateURLHash(); });
  teraSel && teraSel.addEventListener('change', ()=>{ syncTera(); updateURLHash(); });
  const mv = getEl('atk_move_name');
  mv && mv.addEventListener('input', ()=>{ syncTera(); updateURLHash(); });

  // Global debounced auto-update for any change inside #calc
  const deb = debounce(()=>{ updateURLHash(); }, 200);
  calcRoot.addEventListener('input', deb, true);
  calcRoot.addEventListener('change', deb, true);

  // Restore from hash
  function tryRestoreFromHash(){
    const h = location.hash||''; const m = h.match(/[#&]s=([^&]+)/);
    if(m && m[1]){ const st = decodeState(m[1]); applyState(st); } else { syncTera(); updateURLHash(); }
  }
  document.addEventListener('DOMContentLoaded', tryRestoreFromHash);
})();
</script></body>
</html>
